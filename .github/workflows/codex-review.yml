name: Trigger Codex Review

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "Pull request number to trigger @codex review on"
        required: true
        type: string
      body:
        description: "Comment body to post (defaults to '@codex review')"
        required: false
        type: string
        default: "@codex review"

permissions:
  contents: read

jobs:
  trigger:
    if: >-
      (github.event_name == 'workflow_dispatch' &&
       format('{0}', github.event.sender.id) == vars.CODEX_REVIEW_REQUESTER_ID) ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       format('{0}', github.event.comment.user.id) == vars.CODEX_REVIEW_REQUESTER_ID &&
       startsWith(github.event.comment.body, '@codex'))
    runs-on: ubuntu-latest
    steps:
      - name: Post @codex comment as Stupidism and clean up failed attempts
        env:
          GH_TOKEN: ${{ secrets.STUPIDISM_COMMENT_ONLY_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.pr_number || github.event.issue.number }}
          REPO: ${{ github.repository }}
          REQUESTER_ID: ${{ vars.CODEX_REVIEW_REQUESTER_ID }}
          BODY: ${{ github.event.inputs.body || github.event.comment.body }}
        run: |
          set -euo pipefail
          if [ -z "${GH_TOKEN:-}" ]; then
            echo "STUPIDISM_COMMENT_ONLY_TOKEN secret is not configured" >&2
            exit 1
          fi

          # Re-post the requester's intent (or the dispatch input) as Stupidism
          # so the codex connector accepts it.
          gh pr comment "$PR_NUMBER" --repo "$REPO" --body "$BODY"

          # Clean up once the real @codex comment is posted:
          #   - the requester's own `@codex ...` attempts that codex rejected
          #   - `To use Codex here...` replies from the codex connector bot
          gh api "repos/$REPO/issues/$PR_NUMBER/comments" --paginate --jq "
            .[]
            | select(
                ((.user.id | tostring) == \"$REQUESTER_ID\" and (.body | startswith(\"@codex\")))
                or
                (.user.login == \"chatgpt-codex-connector\" and (.body | startswith(\"To use Codex here\")))
              )
            | .id
          " | while read -r comment_id; do
            [ -z "$comment_id" ] && continue
            echo "Deleting comment $comment_id"
            gh api -X DELETE "repos/$REPO/issues/comments/$comment_id"
          done
